; PlatformIO Project Configuration
; Target: Waveshare ESP32-C6 1.47inch LCD (ST7789, 172x320, 262K color)

[env:waveshare_esp32c6]
platform  = https://github.com/pioarduino/platform-espressif32/releases/download/54.03.21-2/platform-espressif32.zip
board     = waveshare_esp32c6
framework = arduino

board_build.flash_size = 4MB
board_build.f_cpu      = 80000000L

monitor_speed   = 115200
monitor_filters = esp32_exception_decoder
upload_speed    = 921600

; Redirect esptool to Python 3.14 (pioarduino esptool 5.x requires Python >=3.10)
extra_scripts = use_python314.py

lib_deps =
    lvgl/lvgl @ ^8.4.0
    moononournation/GFX Library for Arduino @ ^1.6.6

build_flags =
    ; LVGL — expose project include/ so lv_conf.h is found by the library
    -DLV_CONF_INCLUDE_SIMPLE
    -I include
